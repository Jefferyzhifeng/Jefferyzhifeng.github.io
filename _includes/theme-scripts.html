<script>
(function () {
  var root = document.documentElement;

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('site-theme', theme); } catch (e) {}
    var btn = document.querySelector('.theme-toggle');
    if (btn) {
      btn.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
      btn.setAttribute('title', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
  }

  function setupToggle() {
    var btn = document.querySelector('.theme-toggle');
    if (!btn) return;
    var current = root.getAttribute('data-theme') || 'light';
    btn.setAttribute('aria-pressed', current === 'dark' ? 'true' : 'false');
    btn.setAttribute('title', current === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    btn.addEventListener('click', function () {
      var next = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
      applyTheme(next);
    });
  }

  function setupMastheadScroll() {
    var mast = document.querySelector('.masthead');
    if (!mast) return;
    var threshold = 8;
    function update() {
      if (window.pageYOffset > threshold) mast.classList.add('is-scrolled');
      else mast.classList.remove('is-scrolled');
    }
    window.addEventListener('scroll', update, { passive: true });
    update();
  }

  function setupScrollSpy() {
    var navLinks = Array.prototype.slice.call(
      document.querySelectorAll('.greedy-nav .visible-links a[href*="#"]')
    );
    if (!navLinks.length) return;

    var sections = navLinks
      .map(function (a) {
        var href = a.getAttribute('href') || '';
        var hash = href.indexOf('#') >= 0 ? href.slice(href.indexOf('#') + 1) : '';
        if (!hash) return null;
        var el = document.getElementById(hash);
        return el ? { id: hash, el: el, link: a } : null;
      })
      .filter(Boolean);

    if (!sections.length) return;

    function setActive(id) {
      navLinks.forEach(function (a) {
        var href = a.getAttribute('href') || '';
        if (href.indexOf('#' + id) >= 0) a.classList.add('is-active');
        else a.classList.remove('is-active');
      });
    }

    if ('IntersectionObserver' in window) {
      var visible = new Map();
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) visible.set(e.target.id, e.intersectionRatio);
          else visible.delete(e.target.id);
        });
        var best = null;
        var bestRatio = -1;
        visible.forEach(function (ratio, id) {
          if (ratio > bestRatio) { bestRatio = ratio; best = id; }
        });
        if (best) setActive(best);
      }, { rootMargin: '-90px 0px -55% 0px', threshold: [0, 0.25, 0.5, 1] });
      sections.forEach(function (s) { io.observe(s.el); });
    }

    // Initial state based on URL hash
    if (window.location.hash) {
      var initial = window.location.hash.slice(1);
      setActive(initial);
    } else if (sections[0]) {
      setActive(sections[0].id);
    }
  }

  function setupBackToTop() {
    var btn = document.querySelector('.back-to-top');
    if (!btn) return;
    var threshold = 320;
    var ticking = false;
    function onScroll() {
      if (!ticking) {
        window.requestAnimationFrame(function () {
          if (window.pageYOffset > threshold) {
            btn.classList.add('is-visible');
          } else {
            btn.classList.remove('is-visible');
          }
          ticking = false;
        });
        ticking = true;
      }
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    btn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  function onReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  onReady(function () {
    setupToggle();
    setupBackToTop();
    setupMastheadScroll();
    setupScrollSpy();
  });

  // Follow system preference changes only when user hasn't manually chosen
  try {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    if (mq && mq.addEventListener) {
      mq.addEventListener('change', function (e) {
        if (!localStorage.getItem('site-theme')) {
          applyTheme(e.matches ? 'dark' : 'light');
        }
      });
    }
  } catch (e) {}
})();
</script>

<button class="back-to-top" aria-label="Back to top" title="Back to top">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>
